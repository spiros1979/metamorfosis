<!doctype html>
<html lang="el">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Metamorphosis AR Collage</title>
    <link rel="stylesheet" href="styles/main.css" />
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script defer src="js/app.js"></script>
  </head>
  <body>
    <div class="hud" id="hud">
      <h1>AR Συν-Ανάγνωση: Η Μεταμόρφωση</h1>
      <p id="status">Στόχευσε την κάμερα στο marker για να εμφανιστεί το AR κολάζ.</p>
      <p class="marker-note">
        Marker (demo):
        <a href="marker.html" target="_blank" rel="noreferrer">open marker</a>
      </p>
      <div class="controls">
        <button id="toggleQuote" type="button">Απόκρυψη Αποσπάσματος</button>
        <button id="toggleLayer" type="button">Απόκρυψη Εικόνων</button>
        <button id="cycleLens" type="button">Λογοτεχνικός Φακός: Χώρος</button>
      </div>
      <p id="lensText" class="lens-text">Εστίαση στον χώρο: το δωμάτιο ως σύμβολο εγκλωβισμού.</p>
      <p id="quotePanel" class="quote-panel">Το δωμάτιο γίνεται όριο, καταφύγιο και φυλακή μαζί.</p>
    </div>

    <a-scene
      mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.mind; autoStart: true; uiScanning: yes;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <img id="scene-room" src="assets/images/scene-room.svg" alt="AR room scene" />
        <img id="scene-family" src="assets/images/scene-family.svg" alt="AR family scene" />
        <img id="scene-body" src="assets/images/scene-body.svg" alt="AR body scene" />
        <img id="collage-overlay" src="assets/images/collage-overlay.svg" alt="overlay" />
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="marker-root" mindar-image-target="targetIndex: 0">
        <a-plane
          id="layer-main"
          src="#scene-room"
          position="0 0 0"
          height="1"
          width="1.3"
          material="transparent: false"
        ></a-plane>

        <a-plane
          id="layer-overlay"
          src="#collage-overlay"
          position="0 0.15 0.01"
          height="0.65"
          width="1.1"
          material="transparent: true"
        ></a-plane>

        <a-sphere
          id="hotspot"
          position="0.5 0.35 0.04"
          radius="0.06"
          color="#f7b538"
          animation="property: scale; dir: alternate; dur: 850; loop: true; to: 1.2 1.2 1.2"
        ></a-sphere>
      </a-entity>

      <a-entity light="type: ambient; intensity: 0.9"></a-entity>
      <a-entity light="type: directional; intensity: 0.6" position="0 1 1"></a-entity>
    </a-scene>
  </body>
</html>
