<!doctype html>
<html lang="el">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Metamorphosis Marker</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #101114;
        font-family: Georgia, "Times New Roman", serif;
        color: #f4f0e6;
      }

      main {
        width: min(92vw, 1100px);
        display: grid;
        gap: 1rem;
        justify-items: center;
      }

      h1,
      p {
        margin: 0;
        text-align: center;
      }

      .frame {
        width: min(92vw, 1000px);
        aspect-ratio: 16 / 9;
        display: grid;
        place-items: center;
        border: 1px solid rgba(244, 240, 230, 0.18);
        background:
          radial-gradient(circle at top, rgba(31, 39, 48, 0.85), rgba(16, 17, 20, 0.96)),
          #101114;
        overflow: hidden;
      }

      img {
        width: min(42vh, 70vw);
        max-width: 560px;
        transform: rotate(-90deg);
        transform-origin: center;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
      }

      .hint {
        font-size: 0.95rem;
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Marker για οριζόντια προβολή</h1>
      <p>Άφησέ τον ανοιχτό σε άλλη οθόνη ή συσκευή και στόχευσε με το κινητό.</p>
      <div class="frame">
        <img
          src="https://raw.githubusercontent.com/hiukim/mind-ar-js/master/examples/image-tracking/assets/card-example/card.png"
          alt="MindAR marker"
        />
      </div>
      <p class="hint">Αν χρειαστεί, βάλε την οθόνη ή το tablet σε landscape.</p>
    </main>
  </body>
</html>
